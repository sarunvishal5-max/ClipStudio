```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valemont Sales Lab — Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared.css">

<style>
.dashboard-header-card{
    position:relative;
    overflow:hidden;

    max-width:1100px;
    margin:0 auto 40px;

    border-radius:24px;
    border:1px solid rgba(255,255,255,.08);

    background:
        radial-gradient(
            circle at top right,
            rgba(255,255,255,.06),
            transparent 45%
        ),
        rgba(255,255,255,.03);

    backdrop-filter:blur(12px);
}

.dashboard-header-card::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            transparent 0%,
            rgba(255,255,255,.015) 50%,
            transparent 100%
        );

    pointer-events:none;
}

.dashboard-header-content{
    text-align:center;
    padding:60px 40px;
}

.dashboard-title{
    font-size:4.5rem;
    font-weight:700;
    letter-spacing:-2px;
    line-height:1;
    margin:10px 0 0;
    color:var(--text);
}

.dashboard-subtitle{
    margin-top:18px;
    font-size:1.15rem;
    opacity:.7;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:30px;
    max-width:1100px;
    margin:0 auto;
}

.dashboard-card{
    position:relative;
    overflow:hidden;

    min-height:300px;
    border-radius:24px;

    text-decoration:none;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:all .3s ease;

    border:1px solid rgba(255,255,255,.08);

    background:
        radial-gradient(
            circle at top right,
            rgba(255,255,255,.06),
            transparent 45%
        ),
        rgba(255,255,255,.03);

    backdrop-filter:blur(12px);
}

.dashboard-card::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            transparent 0%,
            rgba(255,255,255,.015) 50%,
            transparent 100%
        );

    pointer-events:none;
}

.card-accent{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:4px;

    background:linear-gradient(
        90deg,
        rgba(255,255,255,.85),
        rgba(255,255,255,.25)
    );
}

.dashboard-card:hover{
    transform:translateY(-8px);

    border-color:rgba(255,255,255,.16);

    box-shadow:
        0 25px 60px rgba(0,0,0,.22),
        0 0 40px rgba(255,255,255,.05);
}

.card-content{
    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:100%;

    padding:40px;
    text-align:center;
}

.card-label{
    font-size:3rem;
    font-weight:700;
    line-height:1.05;
    letter-spacing:-1px;
    color:var(--text);
}

@media (max-width:768px){

    .dashboard-title{
        font-size:3.2rem;
    }

    .dashboard-grid{
        grid-template-columns:1fr;
    }

    .card-label{
        font-size:2.2rem;
    }

    .dashboard-header-content{
        padding:40px 24px;
    }
}
</style>
</head>

<body>

<header>

    <img class="logo-img" src="valemont-logo.jpeg" alt="Valemont">

    </button>
  </div>
</header>

<div id="config-banner"></div>

<main>

  <div class="dashboard-header-card fade">
    <div class="card-accent"></div>

    <div class="dashboard-header-content">
      <div class="dash-eyebrow">Valemont Sales Lab</div>

      <h1 class="dashboard-title">
        Dashboard
      </h1>

      <p class="dashboard-subtitle">
        Select a workspace to continue.
      </p>
    </div>
  </div>

  <div class="dashboard-grid fade fade-1">

    <a class="dashboard-card" href="index.html">
      <div class="card-accent"></div>

      <div class="card-content">
        <span class="card-label">
          Recording Studio
        </span>
      </div>

</main>

<footer>
  <span>Valemont Sales Lab</span>
  —
  Browser-native · Private · No data leaves your device
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
csShowConfigBanner();

(async () => {
  const user = await Auth.requireAuth();
  if (!user) return;

  document.getElementById("user-email").textContent =
    user.email || "";
})();

document.getElementById("signout-btn").onclick = async () => {
  await Auth.signOut();
  window.location.replace("auth.html");
};
</script>

</body>
</html>
