<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipStudio — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<header>
  <a class="logo" href="dashboard.html">Clip<span>Studio</span></a>
  <div class="header-right">
    <span class="user-email" id="user-email"></span>
    <button class="btn ghost" id="signout-btn" type="button">Sign out</button>
  </div>
</header>

<div id="config-banner"></div>

<main>
  <div class="dash-hero fade">
    <h1>Dashboard</h1>
    <p>Choose where you want to go.</p>
  </div>

  <div class="dash-grid fade">
    <a class="dash-card" href="index.html">
      <div class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14v-4z"/><rect x="1" y="5" width="14" height="14" rx="2"/></svg>
      </div>
      <h2>Record Dashboard</h2>
      <p>Record camera or voice, auto-detect calls and export clips.</p>
    </a>

    <a class="dash-card" href="history.html">
      <div class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 106 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      </div>
      <h2>Call History</h2>
      <p>Browse your most recent 100 calls with playback and download.</p>
    </a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
csShowConfigBanner();
(async () => {
  const user = await Auth.requireAuth();
  if (!user) return;
  document.getElementById("user-email").textContent = user.email || "";
})();
document.getElementById("signout-btn").onclick = async () => {
  await Auth.signOut();
  window.location.replace("auth.html");
};
</script>
</body>
</html>
