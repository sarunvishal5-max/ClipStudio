<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valemont Sales Lab — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<header>
  <a class="logo" href="auth.html">
    <img class="logo-img" src="valemont-logo.jpeg" alt="Valemont">
    <div class="logo-text-wrap">
      <span class="logo-name">Valemont Sales Lab</span>
      <span class="logo-sub">Recording Intelligence</span>
    </div>
  </a>
  <div class="header-right">
    <div class="header-tag">Browser · Private</div>
  </div>
</header>

<div id="config-banner"></div>

<main>
  <div class="auth-wrap fade">
    <div class="auth-logo-block">
      <img class="auth-logo-img" src="valemont-logo.jpeg" alt="Valemont">
      <div class="auth-app-name">Valemont Sales Lab</div>
      <div class="auth-app-sub">Browser-native · Private · No data leaves your device</div>
    </div>

    <div class="card">
      <h1 id="title">Welcome back</h1>
      <p class="sub" id="subtitle">Sign in to access your dashboard.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" type="button">Sign in</button>
        <button class="auth-tab" id="tab-signup" type="button">Create account</button>
      </div>

      <form id="auth-form" autocomplete="on">
        <div class="field">
          <label for="email">Work email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••••" required minlength="6" autocomplete="current-password">
        </div>
        <button class="btn accent full" id="submit-btn" type="submit" style="padding:11px 16px;font-size:13px;">Sign in</button>
        <div class="form-msg" id="form-msg"></div>
      </form>
    </div>
  </div>
</main>

<footer><span>Valemont Sales Lab</span> — Browser-native · Private · No data leaves your device</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
let mode = "signin";

const titleEl   = document.getElementById("title");
const subEl     = document.getElementById("subtitle");
const submitBtn = document.getElementById("submit-btn");
const msgEl     = document.getElementById("form-msg");
const tabSignin = document.getElementById("tab-signin");
const tabSignup = document.getElementById("tab-signup");
const pwInput   = document.getElementById("password");

csShowConfigBanner();

Auth.getUser().then(u => { if (u) window.location.replace("dashboard.html"); });

function setMode(m) {
  mode = m;
  const signin = m === "signin";
  tabSignin.classList.toggle("active", signin);
  tabSignup.classList.toggle("active", !signin);
  titleEl.textContent   = signin ? "Welcome back" : "Create your account";
  subEl.textContent     = signin ? "Sign in to access your dashboard." : "Sign up to start recording and tracking calls.";
  submitBtn.textContent = signin ? "Sign in" : "Create account";
  pwInput.autocomplete  = signin ? "current-password" : "new-password";
  setMsg("");
}

function setMsg(text, kind) {
  msgEl.textContent = text || "";
  msgEl.className = "form-msg" + (kind ? " " + kind : "");
}

tabSignin.onclick = () => setMode("signin");
tabSignup.onclick = () => setMode("signup");

document.getElementById("auth-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = pwInput.value;
  if (!email || !password) { setMsg("Enter your email and password.", "error"); return; }

  submitBtn.disabled = true;
  setMsg(mode === "signin" ? "Signing in…" : "Creating account…");
  try {
    const res = mode === "signin"
      ? await Auth.signIn(email, password)
      : await Auth.signUp(email, password);

    if (res.needsConfirm) {
      setMsg("Account created — check your email to confirm, then sign in.", "ok");
      setMode("signin");
      submitBtn.disabled = false;
      return;
    }
    setMsg("Success — redirecting…", "ok");
    window.location.replace("dashboard.html");
  } catch (err) {
    setMsg(err.message || "Something went wrong.", "error");
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
